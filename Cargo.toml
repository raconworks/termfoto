[package]
name = "darkroom"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "darkroom"
path = "src/main.rs"

[dependencies]
ratatui = "0.28"
crossterm = "0.28"
ratatui-image = { version = "2", features = ["crossterm"] }
image = { version = "0.25", default-features = false, features = ["png", "jpeg", "webp", "gif", "bmp", "tiff", "ico"] }
clap = { version = "4", features = ["derive"] }
anyhow = "1"

[dev-dependencies]
tempfile = "3"
