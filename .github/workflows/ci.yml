name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libchafa-dev libglib2.0-dev

      - name: 编译
        run: cargo build

      - name: 测试
        run: cargo test

      - name: Clippy
        run: cargo clippy -- -D warnings
